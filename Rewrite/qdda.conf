/*
[rewrite_local]
^https:\/\/dida365\.com\/api\/v2\/user\/status url script-response-body https://raw.githubusercontent.com/Tangfffyx/Public/refs/heads/main/Rewrite/qdda.conf

[mitm] 
hostname = dida365.com
*/

/**
 * Surge / Quantumult X compatible
 * dida365 /api/v2/user/status response modify
 */

(function () {
  try {
    const body = $response.body;
    if (!body) return $done({});

    const obj = JSON.parse(body);

    obj.proEndDate = "2099-01-01T00:00:00.000+0000";
    obj.needSubscribe = false;
    obj.pro = true;

    return $done({ body: JSON.stringify(obj) });
  } catch (e) {
    // 解析失败就原样放行，避免卡请求
    return $done({});
  }
})();
